version: '3.8'

services:
  # Redis - 消息队列和缓存
  redis:
    image: redis:7-alpine
    container_name: sponge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - 数据库 (可选，默认使用 SQLite)
  postgres:
    image: postgres:15-alpine
    container_name: sponge-postgres
    environment:
      POSTGRES_DB: sponge
      POSTGRES_USER: sponge
      POSTGRES_PASSWORD: sponge123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sponge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端服务
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sponge-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./sponge.db
      # 使用 PostgreSQL 时改为:
      # - DATABASE_URL=postgresql://sponge:sponge123@postgres:5432/sponge
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-in-production
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./sponge.db:/app/sponge.db
    restart: unless-stopped

  # Celery Worker - 异步任务处理
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sponge-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=sqlite:///./sponge.db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-in-production
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
    depends_on:
      - api
      - redis
    volumes:
      - ./data:/app/data
      - ./sponge.db:/app/sponge.db
    restart: unless-stopped

  # Celery Beat - 定时任务调度器 (可选)
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: sponge-beat
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=sqlite:///./sponge.db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  # Streamlit 前端服务
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: sponge-frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  default:
    name: sponge-network
